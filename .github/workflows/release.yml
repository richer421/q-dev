name: Release qdev-cli

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cd qdev-cli
          BINARY_NAME=qdev
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME=qdev.exe
          fi
          go build -ldflags="-s -w -X github.com/richer421/qdev-cli/cmd.Version=${VERSION} -X github.com/richer421/qdev-cli/cmd.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o dist/${BINARY_NAME}-${GOOS}-${GOARCH} .
          chmod +x dist/${BINARY_NAME}-${GOOS}-${GOARCH}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qdev-${{ matrix.goos }}-${{ matrix.goarch }}
          path: qdev-cli/dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release assets
        run: |
          cp qdev-cli/install.sh dist/install.sh

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## 安装

            ```bash
            # 一键安装
            curl -fsSL https://github.com/richer421/q-dev/releases/latest/download/install.sh | bash

            # 安装此版本
            curl -fsSL https://github.com/richer421/q-dev/releases/download/${{ github.ref_name }}/install.sh | bash
            ```

            ## 手动下载

            | 平台 | 文件 |
            |------|------|
            | macOS (Intel) | `qdev-darwin-amd64` |
            | macOS (Apple Silicon) | `qdev-darwin-arm64` |
            | Linux (x64) | `qdev-linux-amd64` |
            | Linux (ARM64) | `qdev-linux-arm64` |
            | Windows | `qdev-windows-amd64.exe` |
